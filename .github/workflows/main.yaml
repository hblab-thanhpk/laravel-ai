name: My Awesome Pipeline

on: [push]

# Hủy run cũ khi có push mới trên cùng branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Kiểm tra code style với Laravel Pint
  # ─────────────────────────────────────────
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laravel-ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: laravel-ai/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('laravel-ai/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint (dry-run)
        run: ./vendor/bin/pint --test

  # ─────────────────────────────────────────
  # JOB 2: Chạy PHPUnit tests (SQLite in-memory)
  # ─────────────────────────────────────────
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: laravel-ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: laravel-ai/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('laravel-ai/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test

  # ─────────────────────────────────────────
  # JOB 3: Build & push Docker image (chỉ khi merge vào main)
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: laravel-ai
          file: laravel-ai/docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          # Dùng GitHub Actions cache để tăng tốc build
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 4: Deploy lên server production
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # Bật manual approval trong GitHub Environments nếu cần

    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /var/www/app

            # Pull image mới nhất
            docker compose pull

            # Bật maintenance mode trước khi migrate
            docker compose exec -T app php artisan down --retry=5

            # Cập nhật container
            docker compose up -d --remove-orphans

            # Chạy migration
            docker compose exec -T app php artisan migrate --force

            # Xóa cache cũ, build lại cache mới
            docker compose exec -T app php artisan optimize:clear
            docker compose exec -T app php artisan optimize

            # Tắt maintenance mode
            docker compose exec -T app php artisan up
